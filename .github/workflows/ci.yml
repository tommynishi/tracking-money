# CI（development-flow.md 5.1）
# PR と main への push で lint / typecheck / test（Unit・Integration）/ build を実行する。
# Integration テストは CI 上でローカル Supabase を起動して実DBに対して実行する。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        working-directory: backend
        run: supabase start

      - name: Integration test
        run: npm run test:integration

      - name: Build
        run: npm run build
